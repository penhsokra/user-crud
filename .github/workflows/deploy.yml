name: Deploy to EC2 Tomcat

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build WAR
        run: mvn clean package -DskipTests

      # RENAME THE WAR FILE TO ROOT.war
      - name: Rename Artifact
        run: mv target/*.war target/ROOT.war

      # CLEANUP THE EXISTING ROOT FOLDER ON EC2
      - name: Cleanup Old ROOT Folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }} 
          script: |
            sudo rm -rf /opt/tomcat/webapps/ROOT
            sudo rm -f /opt/tomcat/webapps/ROOT.war

      - name: Copy ROOT.war to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }} 
          source: "target/ROOT.war"
          target: "/opt/tomcat/webapps/"
          strip_components: 1
          overwrite: true

      - name: Restart Tomcat
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl restart tomcat