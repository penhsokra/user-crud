name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated version

      - name: Setup Java
        uses: actions/setup-java@v4 # Updated version
        with:
          distribution: 'temurin'
          java-version: '21' # CHANGED FROM 17 TO 21

      - name: Build WAR
        run: mvn clean package

      - name: Copy WAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # Verify your project's artifact name matches 'app.war' 
          # Or use 'target/*.war'
          source: "target/*.war" 
          target: "/opt/tomcat/webapps/"
          strip_components: 1 # This prevents it from creating a 'target' folder on EC2

      - name: Restart Tomcat
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl restart tomcat