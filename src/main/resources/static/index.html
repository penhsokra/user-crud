<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="loaderOverlay" class="loader-overlay">
        <div class="loader-card">
            <div class="spinner"></div>
            <div class="loader-text">Loading...</div>
        </div>
    </div>
    <div class="container">
        <header>
            <h1><i class="fas fa-users-gear text-primary"></i> User Management</h1>
            <button class="btn btn-primary" onclick="openModal()">
                <i class="fas fa-plus"></i> New User
            </button>
        </header>

        <div class="glass-card">
            <div class="search-bar">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="userSearch" placeholder="Search by name, email or role..."
                    onkeyup="filterUsers()">
            </div>

            <div class="table-container">
                <table id="userTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- Rows will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- User Modal -->
    <div id="userModal" class="modal-overlay">
        <div class="modal">
            <h2 id="modalTitle" style="margin-bottom: 24px;">Create New User</h2>
            <form id="userForm">
                <input type="hidden" id="userId">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" required>
                        <option value="USER">User</option>
                        <option value="ADMIN">Administrator</option>
                        <option value="MODERATOR">Moderator</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn" style="background: #f1f5f9;"
                        onclick="closeModal()">Cancel</button>
                    <button type="submit" id="submitBtn" class="btn btn-primary">
                        <i class="fas fa-spinner fa-spin"></i>
                        <span id="submitBtnText">Save User</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/index.js"></script>
</body>

</html>
